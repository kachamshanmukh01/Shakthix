<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAKTHIX | Unleash Your Strength</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* CSS VARIABLE FOR BACKGROUND IMAGE */
            --bg-image: url('https://res.cloudinary.com/dzq8jeszu/image/upload/v1772733407/WhatsApp_Image_2026-03-05_at_10.55.14_PM_llewma.jpg');
            --brand-blue: #70b8f8;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        .hero-section {
            height: 100vh;
            width: 100%;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Dark overlay to ensure text readability */
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.7));
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
            padding: 0 20px;
        }

        .hero-title {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 0.9;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .hero-subtitle {
            font-size: clamp(1rem, 2vw, 1.5rem);
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto 2rem;
            font-weight: 400;
        }

        .cta-button {
            background-color: var(--brand-blue);
            color: black;
            padding: 1rem 2.5rem;
            border-radius: 9999px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(112, 184, 248, 0.3);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <main class="hero-section">
        <div class="hero-overlay"></div>
        
        <div class="hero-content">
            <h1 class="hero-title">SHAKTHIX</h1>
            <p class="hero-subtitle">
                The ultimate fitness companion. Track your nutrition, log your workouts, and achieve your peak performance.
            </p>
            <a href="/" class="cta-button">Start Your Journey</a>
        </div>
    </main>

</body>
</html>
